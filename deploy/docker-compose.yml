services:
  postgres:
    image: postgres:16
    container_name: specflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-specflow}
      POSTGRES_USER: ${POSTGRES_USER:-specflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - specflow-net
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER:-specflow}
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: specflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - specflow-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        MODULE: specflow-api
    container_name: specflow-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-specflow}
      DB_USER: ${POSTGRES_USER:-specflow}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "8080:8080"
    networks:
      - specflow-net

networks:
  specflow-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
