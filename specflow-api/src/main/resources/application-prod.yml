# 生产环境配置
spring:
  output:
    ansi:
      enabled: never

  # 生产环境数据库配置（使用环境变量）
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:specflow}
    username: ${DB_USER:specflow}
    password: ${DB_PASSWORD}

# 生产环境日志级别
logging:
  level:
    root: WARN
    com.specflow: INFO

# Actuator 在生产环境仅授权后显示详细信息
management:
  endpoint:
    health:
      show-details: when-authorized
