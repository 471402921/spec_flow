spring:
  # 测试环境配置
  application:
    name: specflow-api-test

  # 使用内存数据库（H2）进行测试
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:

  # Flyway 配置 - 禁用，因为 H2 不支持 PostgreSQL 的 FUNCTION/TRIGGER 语法
  flyway:
    enabled: false

  # SQL 初始化配置 - 使用简化的 H2 兼容 schema
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

  # JPA/Hibernate 配置
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: ASSIGN_UUID

# 日志配置
logging:
  level:
    com.specflow: DEBUG
    org.springframework.test: INFO
