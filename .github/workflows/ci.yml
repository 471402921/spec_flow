name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # Job 1: 代码规范检查
  checkstyle:
    name: Code Style Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Run Checkstyle
        run: ./mvnw checkstyle:check --no-transfer-progress --batch-mode

  # Job 2: 构建与测试
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: checkstyle  # 仅在 checkstyle 通过后执行

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Build and run tests
        run: ./mvnw clean test --no-transfer-progress --batch-mode
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Generate JaCoCo coverage report
        run: ./mvnw jacoco:report --no-transfer-progress --batch-mode

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            **/target/site/jacoco/
          retention-days: 7

  # Job 3: 打包验证
  package:
    name: Verify Package
    runs-on: ubuntu-latest
    needs: build-and-test  # 仅在测试通过后执行

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Package application
        run: ./mvnw package -DskipTests --no-transfer-progress --batch-mode

      - name: Verify JAR files exist
        run: |
          ls -lh soulpal-api/target/*.jar
          ls -lh soulpal-worker/target/*.jar
